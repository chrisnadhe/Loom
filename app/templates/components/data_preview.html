<div class="mt-12 space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="flex justify-between items-end">
        <div class="space-y-1">
            <h3 class="text-xl font-bold">Data Preview: {{ filename }}</h3>
            <p class="text-sm text-slate-500">Showing 5 of {{ row_count }} rows</p>
        </div>
    <div class="flex flex-col md:flex-row gap-4 items-end">
        <div class="space-y-2 w-full md:w-64">
            <label class="text-xs font-bold uppercase text-slate-500">Select Template</label>
            <select name="template" id="template-select" class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 outline-none">
                <option value="">-- Choose a Template --</option>
                {% for t in templates %}
                <option value="{{ t }}">{{ t | replace('.j2', '') | replace('_', ' ') | title }}</option>
                {% endfor %}
            </select>
        </div>
        <button 
            hx-post="/api/mapping" 
            hx-include="#template-select"
            hx-target="#mapping-container"
            class="px-6 py-2 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-lg transition-all shadow-lg shadow-brand-500/20 whitespace-nowrap">
            Initialize Mapping
        </button>
    </div>
</div>

<div id="mapping-container" class="mt-8">
    <!-- Mapping UI will appear here -->
</div>
    <div class="glass rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 dark:bg-slate-900/50">
                        {% for col in columns %}
                        <th class="px-4 py-3 text-xs font-bold uppercase tracking-wider text-slate-500 border-b border-slate-200 dark:border-slate-800">
                            {{ col }}
                        </th>
                        {% endfor %}
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 dark:divide-slate-800">
                    {% for row in data %}
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-900/30 transition-colors">
                        {% for col in columns %}
                        <td class="px-4 py-3 text-sm text-slate-600 dark:text-slate-400">
                            {{ row[col] }}
                        </td>
                        {% endfor %}
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

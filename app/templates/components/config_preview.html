<div class="space-y-8 animate-in fade-in slide-in-from-bottom-8 duration-700">
    <div class="flex items-center justify-between">
        <div>
            <h3 class="text-2xl font-bold">Review & Edit Configurations</h3>
            <p class="text-slate-500">Manual adjustments can be made before final generation</p>
        </div>
        <div class="flex gap-3">
            <button onclick="document.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = true)" class="text-sm font-bold text-brand-600 hover:text-brand-700">Select All</button>
            <button onclick="document.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = false)" class="text-sm font-bold text-slate-500 hover:text-slate-600">Deselect All</button>
        </div>
    </div>

    <form hx-post="/api/generate" hx-target="#preview-container" class="space-y-6">
        <div class="grid grid-cols-1 gap-8">
            {% for res in results %}
            {% set idx = loop.index0 %}
            <div class="glass rounded-3xl overflow-hidden border border-slate-200 dark:border-slate-800 shadow-lg group">
                <div class="bg-slate-50 dark:bg-slate-900/50 px-6 py-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
                    <div class="flex items-center gap-4">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" name="approved_{{ idx }}" class="sr-only peer" checked>
                            <div class="w-6 h-6 bg-slate-200 peer-focus:outline-none rounded-md peer dark:bg-slate-700 peer-checked:bg-emerald-500 transition-all flex items-center justify-center">
                                <svg class="w-4 h-4 text-white opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                        </label>
                        <input type="text" name="config_name_{{ idx }}" value="{{ res.name }}" class="bg-transparent font-bold text-slate-700 dark:text-slate-200 outline-none border-b border-transparent focus:border-brand-500 px-1">
                    </div>
                    <span class="text-xs font-mono text-slate-400">{{ template_name }}</span>
                </div>
                <textarea 
                    name="config_content_{{ idx }}" 
                    rows="12" 
                    class="w-full bg-slate-900 text-slate-300 font-mono text-sm p-6 outline-none focus:ring-2 focus:ring-brand-500/50 transition-all resize-none"
                >{{ res.content }}</textarea>
            </div>
            {% endfor %}
        </div>

        <div class="sticky bottom-8 flex justify-center pt-8">
            <button type="submit" class="px-12 py-5 bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold rounded-2xl transition-all shadow-2xl shadow-emerald-500/40 flex items-center gap-3 text-lg group">
                Confirm & Generate All Files
                <svg class="w-6 h-6 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </button>
        </div>
    </form>
</div>

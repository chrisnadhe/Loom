<div class="space-y-8 animate-in fade-in slide-in-from-bottom-8 duration-700">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h3 class="text-2xl font-bold">Review &amp; Edit Configurations</h3>
            <p class="text-slate-500">Manually adjust configs before finalising. Use AI Review for security insights.</p>
        </div>
        <div class="flex gap-3">
            <button onclick="document.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = true)"
                class="text-sm font-bold text-brand-600 hover:text-brand-700 transition-colors">
                Select All
            </button>
            <button onclick="document.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = false)"
                class="text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors">
                Deselect All
            </button>
        </div>
    </div>

    <form hx-post="/api/generate" hx-target="#preview-container" hx-indicator="#htmx-indicator" class="space-y-8">
        {% for res in results %}
        {% set idx = loop.index0 %}
        <div class="glass rounded-3xl overflow-hidden border border-slate-200 dark:border-slate-800 shadow-lg">
            <!-- Config header -->
            <div class="bg-slate-50 dark:bg-slate-900/50 px-6 py-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
                <div class="flex items-center gap-4">
                    <!-- Approve checkbox -->
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" name="approved_{{ idx }}" id="approved_{{ idx }}" class="sr-only peer" checked>
                        <div class="w-6 h-6 bg-slate-200 dark:bg-slate-700 peer-focus:ring-2 peer-focus:ring-brand-500 rounded-md peer-checked:bg-emerald-500 transition-all flex items-center justify-center">
                            <svg class="w-4 h-4 text-white opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                            </svg>
                        </div>
                    </label>
                    <!-- Device name (editable) -->
                    <input type="text" name="config_name_{{ idx }}" value="{{ res.name }}"
                        class="bg-transparent font-bold text-slate-700 dark:text-slate-200 outline-none border-b border-transparent focus:border-brand-500 px-1 transition-colors">
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-xs font-mono text-slate-400">{{ template_name }}</span>
                    <!-- AI Review button -->
                    <button type="button"
                        hx-post="/api/ai/review-config"
                        hx-include="[name='config_content_{{ idx }}'], [name='config_name_{{ idx }}']"
                        hx-target="#ai-review-{{ idx }}"
                        hx-swap="innerHTML"
                        hx-indicator="#htmx-indicator"
                        class="px-3 py-1.5 text-xs font-bold bg-indigo-100 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400 rounded-lg hover:bg-indigo-200 dark:hover:bg-indigo-900/50 transition-colors flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                        Review with AI
                    </button>
                </div>
            </div>

            <!-- Editable textarea -->
            <textarea
                name="config_content_{{ idx }}"
                rows="14"
                class="w-full bg-slate-900 text-slate-300 font-mono text-sm p-6 outline-none focus:ring-2 focus:ring-inset focus:ring-brand-500/50 transition-all resize-none leading-relaxed"
            >{{ res.content }}</textarea>

            <!-- AI review panel (target) -->
            <div id="ai-review-{{ idx }}" class="border-t border-slate-800">
                <!-- AI review result appears here -->
            </div>
        </div>
        {% endfor %}

        <!-- Sticky confirm button -->
        <div class="sticky bottom-6 flex justify-center pt-4">
            <button type="submit"
                class="px-12 py-5 bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold rounded-2xl transition-all shadow-2xl shadow-emerald-500/40 flex items-center gap-3 text-lg group">
                Confirm &amp; Generate All Files
                <svg class="w-6 h-6 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </button>
        </div>
    </form>
</div>

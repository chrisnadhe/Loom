<div class="glass rounded-3xl p-8 shadow-xl space-y-6 animate-in fade-in zoom-in-95 duration-300">
    <div class="flex items-center gap-3 border-b border-slate-200 dark:border-slate-800 pb-4">
        <div class="w-10 h-10 bg-brand-100 dark:bg-brand-900/30 rounded-xl flex items-center justify-center text-brand-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m4-4l-4-4"></path></svg>
        </div>
        <div>
            <h3 class="text-xl font-bold">Configure Mappings</h3>
            <p class="text-sm text-slate-500">Map template variables to your data columns</p>
        </div>
        <button 
            type="button"
            hx-post="/api/ai/suggest-mapping" 
            hx-include="[name='template']"
            hx-target="#mapping-form"
            hx-swap="innerHTML"
            class="ml-auto px-4 py-2 bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-bold rounded-xl hover:bg-indigo-200 transition-all flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            Auto-Map with AI
        </button>
    </div>

    <form id="mapping-form" hx-post="/api/generate" class="space-y-4">
        {% include "components/mapping_form.html" %}
    </form>
</div>

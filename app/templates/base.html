<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Loom - Network Configuration Generator{% endblock %}</title>
    <meta name="description" content="Professional bulk network configuration generator for Cisco, Arista, and Aruba devices.">
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f7ff', 100: '#ebf0fe', 200: '#dae3fd',
                            300: '#bdccfb', 400: '#94a9f8', 500: '#6d7df3',
                            600: '#4a4ded', 700: '#3c3cdb', 800: '#3534b2',
                            900: '#2f318e', 950: '#1d1d53',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        [vx-cloak] { display: none !important; }

        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.75);
        }

        /* HTMX loading indicator */
        #htmx-indicator {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #4a4ded, #6d7df3, #94a9f8);
            background-size: 200% 100%;
            animation: shimmer 1.2s linear infinite;
            z-index: 9999;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .htmx-request #htmx-indicator { display: block; }

        /* Smooth page transitions */
        .htmx-swapping { opacity: 0; transition: opacity 0.15s ease; }
        .htmx-settling  { opacity: 0; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans min-h-screen transition-colors duration-300">

    <!-- Global HTMX loading bar -->
    <div id="htmx-indicator"></div>

    <nav class="sticky top-0 z-50 glass border-b border-slate-200 dark:border-slate-800 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <!-- Brand -->
            <a href="/" class="flex items-center gap-2.5 hover:opacity-80 transition-opacity">
                <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center text-white font-bold text-sm shadow-lg shadow-brand-500/30">L</div>
                <span class="text-xl font-bold tracking-tight">Loom</span>
            </a>

            <!-- Navigation links -->
            <div class="flex items-center gap-1">
                {% set nav_items = [('/', 'Dashboard'), ('/templates', 'Templates'), ('/download', 'Download'), ('/history', 'History')] %}
                {% for href, label in nav_items %}
                <a href="{{ href }}"
                   class="px-3 py-1.5 text-sm font-medium rounded-lg transition-colors
                          {% if request.url.path == href %}
                            bg-brand-50 dark:bg-brand-900/20 text-brand-600 dark:text-brand-400
                          {% else %}
                            text-slate-600 dark:text-slate-400 hover:text-brand-600 hover:bg-slate-100 dark:hover:bg-slate-800
                          {% endif %}">
                    {{ label }}
                </a>
                {% endfor %}

                <!-- Dark mode toggle -->
                <button id="theme-toggle" class="ml-3 p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors" aria-label="Toggle theme">
                    <svg id="icon-dark" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                    </svg>
                    <svg id="icon-light" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        // ── Dark mode ──────────────────────────────────────────────────
        const html  = document.documentElement;
        const iconD = document.getElementById('icon-dark');
        const iconL = document.getElementById('icon-light');

        function applyTheme(dark) {
            html.classList.toggle('dark', dark);
            iconD.classList.toggle('hidden', !dark);
            iconL.classList.toggle('hidden', dark);
        }

        const stored = localStorage.getItem('color-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(stored ? stored === 'dark' : prefersDark);

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isDark = html.classList.contains('dark');
            localStorage.setItem('color-theme', isDark ? 'light' : 'dark');
            applyTheme(!isDark);
        });
    </script>
</body>
</html>
